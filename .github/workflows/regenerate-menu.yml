name: Regenerate Menu for Specific Date

on:
  workflow_dispatch:
    inputs:
      date:
        description: '要重新生成的日期（格式：YYYY-MM-DD，如 2026-04-06）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate date format
        run: |
          DATE="${{ github.event.inputs.date }}"
          if ! echo "$DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "ERROR: Invalid date format. Use YYYY-MM-DD"
            exit 1
          fi
          echo "Will regenerate menu for: $DATE"

      - name: Remove existing data file
        run: |
          DATE="${{ github.event.inputs.date }}"
          FILE="data/${DATE}.json"
          if [ -f "$FILE" ]; then
            rm "$FILE"
            echo "Removed existing: $FILE"
          else
            echo "No existing file for $DATE, will generate fresh"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate menu for specific date
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          REGENERATE_DATE: ${{ github.event.inputs.date }}
        run: python scripts/generate_menu.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Regenerate menu for ${{ github.event.inputs.date }}"
            git push
          fi
